site_name: Relationship
site_url: https://datashades.github.io/ckanext-relationship/
repo_url: https://github.com/DataShades/ckanext-relationship

theme:
  name: material
  logo: image/logo.png
  favicon: image/favicon.ico
  font:
    text: Accia Flare
    code: Cascadia Code
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.footer
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.select

watch:
  - README.md
  - docs/
  - ckanext/relationship/
  - ckanext/relationship_dashboard/

nav:
  - Home: index.md
  - Install: install.md
  - Scheming Fields: schema/index.md
  - Actions and API: actions.md
  - Helpers and Templates: helpers.md
  - Dashboard: dashboard.md
  - Configuration: config.md

markdown_extensions:
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      separator: '[\s\-\.\_]+'
