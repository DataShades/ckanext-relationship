version: 1
groups:
  - annotation: ckanext-relationship
    options:
      - key: ckanext.relationship.views_without_relationships_in_package_show
        type: list
        default: search read
        description: |
          Adding relationships to the package show result can be time-consuming and
          may decrease the performance of pages where this action is called multiple
          times, such as the search page. Therefore, by default, relationships are
          hidden from the package show for both the search page and the package read
          page. To include relationships in the package_show action, you must add the
          flag with_relationships=True to the data_dict.

      - key: ckanext.relationship.show_relationship_graph_on_dataset_read
        type: bool
        default: true
        description: |
          Controls whether the optional relationship graph section is added
          automatically to dataset read pages when the relationship_graph plugin
          is enabled. Manual use of the graph snippet in custom templates is not
          affected.

      - key: ckanext.relationship.show_relationship_graph_on_group_about
        type: bool
        default: true
        description: |
          Controls whether the optional relationship graph section is added
          automatically to group About pages when the relationship_graph plugin
          is enabled. The section is rendered only when the current group has at
          least one relationship. Manual use of the graph snippet in custom
          templates is not affected.

      - key: ckanext.relationship.show_relationship_graph_on_organization_about
        type: bool
        default: true
        description: |
          Controls whether the optional relationship graph section is added
          automatically to organization About pages when the
          relationship_graph plugin is enabled. The section is rendered only
          when the current organization has at least one relationship.
          Manual use of the graph snippet in custom templates is not affected.

      - key: ckanext.relationship.async_package_index_rebuild
        type: bool
        default: false
        description: |
            If true, when a relationship is created, updated or deleted, the related
            packages will be re-indexed in the background using a task queue. This can
            help improve solve timeouts and performance issues on sites with a large
            number of relationships. If false, the related packages will be re-indexed
            immediately.

      - key: ckanext.relationship.redis_queue_name
        type: base
        default: "default"
        description: |
            The name of the Redis queue to use for background tasks.

      - key: ckanext.relationship.allow_name_based_relation_create
        type: bool
        default: false
        description: |
            Controls whether new relationships may be created using entity names
            instead of CKAN IDs. Direct action calls only allow name-to-name
            creation when this is enabled, and mixed identifier pairs such as
            id+name remain invalid. Scheming-backed dataset create and update
            flows first try to resolve names into local IDs, fall back to
            temporary name-to-name rows only when needed, and later canonicalize
            them to id-to-id once both local entities exist.
